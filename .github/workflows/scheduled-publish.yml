name: Scheduled Publish

on:
  schedule:
    # 5:00 AM Central (CDT = UTC-5, so 10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Empty commit to trigger Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled rebuild for post publishing"
          git push
