<!-- JSON-LD: Person + WebSite (richer than seo.html default) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "{{ site.url }}{{ site.baseurl }}/#person",
      "name": "W. Scott Langford",
      "givenName": "W. Scott",
      "familyName": "Langford",
      "jobTitle": "Assistant Professor of Public Administration",
      "affiliation": {
        "@type": "CollegeOrUniversity",
        "name": "Texas State University",
        "url": "https://www.txst.edu/"
      },
      "alumniOf": [
        {"@type": "CollegeOrUniversity", "name": "University of North Carolina at Chapel Hill", "url": "https://www.unc.edu/"},
        {"@type": "CollegeOrUniversity", "name": "Arizona State University", "url": "https://www.asu.edu/"}
      ],
      "email": "mailto:scottlangford@txstate.edu",
      "url": "{{ site.url }}{{ site.baseurl }}/",
      "sameAs": [
        "https://scholar.google.com/citations?user=MUskjdAAAAAJ&hl=en",
        "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=3067746",
        "https://osf.io/89q6x/",
        "https://github.com/scottlangford2",
        "https://bsky.app/profile/scottlangford2.bsky.social"
      ],
      "knowsAbout": ["Public Finance", "Economic Development", "Public Administration", "Regional Economics", "Applied Econometrics"]
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}{{ site.baseurl }}/#website",
      "url": "{{ site.url }}{{ site.baseurl }}/",
      "name": "W. Scott Langford",
      "publisher": {"@id": "{{ site.url }}{{ site.baseurl }}/#person"},
      "inLanguage": "en-US"
    },
    {
      "@type": "Blog",
      "@id": "{{ site.url }}{{ site.baseurl }}/year-archive/#blog",
      "url": "{{ site.url }}{{ site.baseurl }}/year-archive/",
      "name": "Southbound 35",
      "description": "Public finance and economic development on the Texas corridor, with occasional detours into sports, politics, and religion.",
      "author": {"@id": "{{ site.url }}{{ site.baseurl }}/#person"},
      "publisher": {"@id": "{{ site.url }}{{ site.baseurl }}/#person"}
    }
  ]
}
</script>

<!-- MathJax -->

<!-- v5 design tokens (Spectral serif body, DM Sans labels, TXST maroon) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg:         #faf8f5;
    --ink:        #1a1a1a;
    --muted:      #666;
    --hairline:   #d6d6d2;
    --maroon:     #501214;
    --gold:       #D7BD8A;
  }

  /* Backgrounds + base typography */
  body, html { background: var(--bg) !important; }
  body {
    font-family: 'Spectral', Georgia, 'Times New Roman', serif !important;
    color: var(--ink) !important;
    line-height: 1.65 !important;
  }
  .page__content,
  .page__content p,
  .page__content li,
  .archive__item-excerpt {
    font-family: 'Spectral', Georgia, serif !important;
    line-height: 1.65 !important;
  }

  /* Justified text everywhere */
  body, body p, body li, body div, body span,
  .page__content, .page__content p, .page__content li,
  .archive__item-excerpt,
  article, article p, article li,
  blockquote, blockquote p,
  .sidebar, .sidebar p, .sidebar li,
  .author__urls, .author__urls li,
  .page__footer, .page__footer p, .page__footer li,
  .masthead p,
  .archive__subtitle {
    text-align: justify !important;
    hyphens: auto;
    -webkit-hyphens: auto;
    -ms-hyphens: auto;
  }

  /* Headings — Spectral for h1, DM Sans for h2/h3 as section labels */
  h1, .page__title {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 700 !important;
    letter-spacing: -0.01em !important;
    color: var(--ink) !important;
  }
  .page__title { font-size: 2.4rem !important; }
  .page__content h2 {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.14em !important;
    color: var(--ink) !important;
    border-top: 1px solid var(--hairline) !important;
    border-bottom: none !important;
    padding-top: 1rem !important;
    margin: 1.75rem 0 0.75rem !important;
    display: flex !important;
    align-items: center !important;
    gap: 0.5rem !important;
  }
  .page__content h2::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }
  .page__content h3 {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 1.15rem !important;
    color: var(--ink) !important;
  }

  /* Links — TXST maroon, underlined on hover */
  a, .page__content a {
    color: var(--maroon) !important;
    text-decoration: none !important;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  a:hover, .page__content a:hover {
    color: var(--maroon) !important;
    border-bottom-color: currentColor;
  }

  /* Top masthead (academicpages nav) — cream background, DM Sans */
  .masthead {
    background: var(--bg) !important;
    border-bottom: 2px solid var(--ink) !important;
  }
  .masthead__menu-item a,
  .greedy-nav a {
    font-family: 'DM Sans', sans-serif !important;
    color: var(--ink) !important;
  }
  .masthead__menu-item a:hover,
  .greedy-nav a:hover {
    color: var(--maroon) !important;
  }
  .greedy-nav {
    background: var(--bg) !important;
  }

  /* Move the author sidebar to the right side of the page */
  #main {
    display: flex !important;
    flex-direction: row-reverse !important;
    align-items: flex-start !important;
    gap: 2rem;
  }
  .sidebar.sticky {
    background: #f5f2ed !important;
    border-radius: 8px !important;
    padding: 1rem !important;
    float: none !important;
    flex: 0 0 240px !important;
    max-width: 240px !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
  }
  .archive,
  article.page,
  .page__inner-wrap {
    flex: 1 1 auto !important;
    min-width: 0 !important;
    float: none !important;
  }
  @media (max-width: 800px) {
    #main { flex-direction: column !important; gap: 1rem; }
    .sidebar.sticky { flex: 0 0 auto !important; max-width: 100% !important; }
  }
  .author__name {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 700 !important;
  }
  .author__bio,
  .author__urls li {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
  }
  .author__urls a {
    color: #444 !important;
  }
  .author__urls a:hover {
    color: var(--maroon) !important;
  }
  .author__avatar img {
    border-radius: 6px !important;
  }

  /* Archive items (the post/research/portfolio cards) */
  .archive__item-title {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 600 !important;
  }
  .archive__item-title a {
    color: var(--ink) !important;
  }
  .archive__item-title a:hover {
    color: var(--maroon) !important;
  }
  .archive__subtitle {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.14em !important;
    color: var(--muted) !important;
    border-bottom: 1px solid var(--hairline) !important;
    padding-bottom: 0.4rem !important;
    margin-top: 1.5rem !important;
  }

  /* Page footer */
  .page__footer {
    background: var(--bg) !important;
    border-top: 1px solid var(--hairline) !important;
  }
  .page__footer-copyright,
  .page__footer-follow a {
    font-family: 'DM Sans', sans-serif !important;
  }

  /* Blog-post metadata rows (date, read-time, etc.) — muted DM Sans */
  .page__meta,
  .page__date {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.8rem !important;
    color: var(--muted) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
    margin: 0.25rem 0 !important;
  }
  .page__date strong { font-weight: 600 !important; }

  /* Constrain post body width for readability */
  article.page .page__content {
    max-width: 720px;
  }

  /* Inline post images — center and constrain */
  .page__content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1.5rem auto;
  }

  /* Blockquotes — editorial pull quote style */
  .page__content blockquote {
    border-left: 3px solid var(--maroon);
    margin: 1.5rem 0;
    padding: 0.25rem 0 0.25rem 1.25rem;
    color: #333;
    font-style: italic;
  }

  /* Print stylesheet — clean CV/papers, no chrome */
  @media print {
    body, html { background: #fff !important; color: #000 !important; }
    .masthead, .sidebar, .page__footer, .greedy-nav,
    .author__urls-wrapper, .nav__list, .toc, #site-nav,
    .page__share, .page__meta, .pagination, .author__avatar { display: none !important; }
    #main { display: block !important; }
    article.page, .page__inner-wrap { width: 100% !important; max-width: 100% !important; }
    article.page .page__content { max-width: 100% !important; }
    a, .page__content a { color: #000 !important; text-decoration: none !important; border-bottom: none !important; }
    .page__content a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 0.78em; color: #555; }
    h1, .page__title { font-size: 22pt !important; }
    .page__content h2 {
      font-size: 11pt !important;
      border-top: 1px solid #999 !important;
      padding-top: 0.4em !important;
      margin-top: 1.2em !important;
    }
    .page__content h2::before { display: none !important; }
    .page__content { font-size: 10.5pt; line-height: 1.45; }
    p, li { orphans: 3; widows: 3; }
    h2, h3 { page-break-after: avoid; }
  }
</style>

<!-- end custom head snippets -->
