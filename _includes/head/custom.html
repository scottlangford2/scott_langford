{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="{{ base_path }}/images/favicon.ico"/>
<meta name="theme-color" content="#faf8f5"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- MathJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- v5 design tokens (Spectral serif body, DM Sans labels, TXST maroon) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg:         #faf8f5;
    --ink:        #1a1a1a;
    --muted:      #666;
    --hairline:   #d6d6d2;
    --maroon:     #501214;
    --gold:       #D7BD8A;
  }

  /* Backgrounds + base typography */
  body, html { background: var(--bg) !important; }
  body {
    font-family: 'Spectral', Georgia, 'Times New Roman', serif !important;
    color: var(--ink) !important;
    line-height: 1.65 !important;
  }
  .page__content,
  .page__content p,
  .page__content li,
  .archive__item-excerpt {
    font-family: 'Spectral', Georgia, serif !important;
    line-height: 1.65 !important;
  }

  /* Justified text everywhere */
  body, body p, body li, body div, body span,
  .page__content, .page__content p, .page__content li,
  .archive__item-excerpt,
  article, article p, article li,
  blockquote, blockquote p,
  .sidebar, .sidebar p, .sidebar li,
  .author__urls, .author__urls li,
  .page__footer, .page__footer p, .page__footer li,
  .masthead p,
  .archive__subtitle {
    text-align: justify !important;
    hyphens: auto;
    -webkit-hyphens: auto;
    -ms-hyphens: auto;
  }

  /* Headings — Spectral for h1, DM Sans for h2/h3 as section labels */
  h1, .page__title {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 700 !important;
    letter-spacing: -0.01em !important;
    color: var(--ink) !important;
  }
  .page__title { font-size: 2.4rem !important; }
  .page__content h2 {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.14em !important;
    color: var(--ink) !important;
    border-top: 1px solid var(--hairline) !important;
    border-bottom: none !important;
    padding-top: 1rem !important;
    margin: 1.75rem 0 0.75rem !important;
    display: flex !important;
    align-items: center !important;
    gap: 0.5rem !important;
  }
  .page__content h2::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }
  .page__content h3 {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 1.15rem !important;
    color: var(--ink) !important;
  }

  /* Links — TXST maroon, underlined on hover */
  a, .page__content a {
    color: var(--maroon) !important;
    text-decoration: none !important;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  a:hover, .page__content a:hover {
    color: var(--maroon) !important;
    border-bottom-color: currentColor;
  }

  /* Top masthead (academicpages nav) — cream background, DM Sans */
  .masthead {
    background: var(--bg) !important;
    border-bottom: 2px solid var(--ink) !important;
  }
  .masthead__menu-item a,
  .greedy-nav a {
    font-family: 'DM Sans', sans-serif !important;
    color: var(--ink) !important;
  }
  .masthead__menu-item a:hover,
  .greedy-nav a:hover {
    color: var(--maroon) !important;
  }
  .greedy-nav {
    background: var(--bg) !important;
  }

  /* Author sidebar (academicpages calls this .sidebar) — restyle to v5 sidenav */
  .sidebar.sticky {
    background: #f5f2ed !important;
    border-radius: 8px !important;
    padding: 1rem !important;
  }
  .author__name {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 700 !important;
  }
  .author__bio,
  .author__urls li {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
  }
  .author__urls a {
    color: #444 !important;
  }
  .author__urls a:hover {
    color: var(--maroon) !important;
  }
  .author__avatar img {
    border-radius: 6px !important;
  }

  /* Archive items (the post/research/portfolio cards) */
  .archive__item-title {
    font-family: 'Spectral', Georgia, serif !important;
    font-weight: 600 !important;
  }
  .archive__item-title a {
    color: var(--ink) !important;
  }
  .archive__item-title a:hover {
    color: var(--maroon) !important;
  }
  .archive__subtitle {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.78rem !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.14em !important;
    color: var(--muted) !important;
    border-bottom: 1px solid var(--hairline) !important;
    padding-bottom: 0.4rem !important;
    margin-top: 1.5rem !important;
  }

  /* Page footer */
  .page__footer {
    background: var(--bg) !important;
    border-top: 1px solid var(--hairline) !important;
  }
  .page__footer-copyright,
  .page__footer-follow a {
    font-family: 'DM Sans', sans-serif !important;
  }
</style>

<!-- end custom head snippets -->
